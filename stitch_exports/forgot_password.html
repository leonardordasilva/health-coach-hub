<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Recuperar Senha - Health Coach</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display flex items-center justify-center min-h-screen p-4">
<div class="w-full max-w-[420px] bg-white dark:bg-slate-900 shadow-xl rounded-xl overflow-hidden border border-primary/10">
<!-- Top Navigation -->
<div class="flex items-center p-4">
<button class="text-slate-600 dark:text-slate-400 hover:bg-primary/10 p-2 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
</div>
<div class="px-8 pb-10 pt-4 flex flex-col items-center">
<!-- Header Icon -->
<div class="w-20 h-20 bg-primary/20 rounded-full flex items-center justify-center mb-6">
<div class="w-14 h-14 bg-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-background-dark text-[32px] font-bold">lock_reset</span>
</div>
</div>
<!-- Title and Description -->
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-3 text-center">Recuperar Senha</h1>
<p class="text-slate-500 dark:text-slate-400 text-center text-base mb-8 leading-relaxed">
                Digite seu e-mail para receber as instruções para redefinir sua senha.
            </p>
<!-- Form -->
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">
                        E-mail
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary text-[20px]">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 shadow-sm" id="email" name="email" placeholder="seuemail@exemplo.com" required="" type="email"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 px-6 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 shadow-md active:scale-[0.98]" type="submit">
<span>Enviar link de recuperação</span>
<span class="material-symbols-outlined text-[20px]">send</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-10">
<a class="flex items-center gap-2 text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="#">
<span class="material-symbols-outlined text-[18px]">keyboard_backspace</span>
                    Voltar para o Login
                </a>
</div>
</div>
</div>
</body></html>
