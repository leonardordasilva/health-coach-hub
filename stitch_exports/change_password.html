<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .ios-shadow {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[400px] bg-white dark:bg-slate-900 rounded-xl ios-shadow overflow-hidden border border-slate-100 dark:border-slate-800">
<div class="flex items-center p-4 border-b border-slate-50 dark:border-slate-800">
<button class="text-slate-900 dark:text-slate-100 flex items-center justify-center p-2 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<div class="flex-1 text-center pr-10">
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-semibold">Recuperar Conta</h1>
</div>
</div>
<div class="p-8 flex flex-col items-center">
<div class="w-20 h-20 bg-primary/10 dark:bg-primary/20 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl">key</span>
</div>
<div class="text-center mb-8">
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold mb-2">Nova Senha</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Crie uma senha forte e segura para proteger seu perfil de Health Coach.</p>
</div>
<form class="w-full space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium ml-1">Nova Senha</label>
<div class="relative flex items-center group">
<input class="w-full h-14 px-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500 pr-12" placeholder="Digite sua nova senha" type="password"/>
<button class="absolute right-4 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium ml-1">Confirmar Nova Senha</label>
<div class="relative flex items-center group">
<input class="w-full h-14 px-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500 pr-12" placeholder="Confirme sua nova senha" type="password"/>
<button class="absolute right-4 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full h-14 bg-primary hover:bg-opacity-90 text-slate-900 font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Salvar Nova Senha</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">check_circle</span>
</button>
</div>
</form>
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 text-slate-400 dark:text-slate-500 text-xs">
<span class="material-symbols-outlined text-sm">lock</span>
<span>Conexão Segura e Criptografada</span>
</div>
<div class="h-1 w-32 bg-slate-100 dark:bg-slate-800 rounded-full mt-4">
<div class="h-full w-full bg-primary rounded-full"></div>
</div>
</div>
</div>
</div>
</body></html>
