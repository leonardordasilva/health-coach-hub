<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .checkbox-custom:checked {
            background-image: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27%23102219%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3cpath d=%27M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z%27/%3e%3c/svg%3e');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display">
<div class="relative flex h-screen w-full flex-col overflow-hidden @container">
<div class="absolute inset-0 z-0 h-full w-full">
<div class="h-full w-full bg-cover bg-center" data-alt="Fresh healthy salad with greens and vegetables" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCtnvNe6X1E51HmkgT10Jc6eLUzYy87VPw2qwTipc7Sg0Ly8heyrHWSaRX6AUClbb6wX-FBPcLf8CtZumYMBJMnj0qLAt8dPkveNMbdHshnmxVhqTcUEUna-wkttKC3FScQRXIIXEg5irORyo0FLUcTrsuQn_YBMenSJXWVq-XgjzH5OnWCRFGip4HOV-o-f4yrGnZ_sk5jJ1kk4x_Sp1Jj_nZ-yYpT8O22heXdbucl2wNCAuI3mLmJdv3k8xeM2Vqfiyj0uykroUk");'>
<div class="h-full w-full bg-emerald-900/40 backdrop-blur-[2px]"></div>
</div>
</div>
<div class="relative z-10 flex flex-1 flex-col items-center justify-center px-6">
<div class="w-full max-w-[420px] rounded-xl bg-background-light/95 dark:bg-background-dark/95 p-8 shadow-2xl backdrop-blur-md">
<div class="mb-8 flex flex-col items-center">
<div class="mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-primary/20 text-primary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">eco</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Health Coach</h1>
<p class="text-sm text-slate-600 dark:text-slate-400">Your journey to wellness starts here</p>
</div>
<form class="space-y-5" onsubmit="return false;">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email</label>
<input class="h-12 w-full rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" placeholder="name@example.com" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Password</label>
<div class="relative">
<input class="h-12 w-full rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pr-12 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" placeholder="Enter your password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between px-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="checkbox-custom h-5 w-5 rounded border-slate-300 dark:border-slate-700 bg-transparent text-primary focus:ring-0 focus:ring-offset-0 transition-colors" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors">Remember me</span>
</label>
<a class="text-sm font-medium text-emerald-600 dark:text-primary hover:underline underline-offset-4" href="#">Forgot password?</a>
</div>
<button class="flex h-12 w-full items-center justify-center rounded-lg bg-primary px-4 text-slate-900 font-bold shadow-lg shadow-primary/20 hover:brightness-105 active:scale-[0.98] transition-all">
                        Login
                    </button>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Are you a professional? 
                        <a class="ml-1 font-semibold text-emerald-600 dark:text-primary hover:underline underline-offset-4" href="#">Sign up</a>
</p>
</div>
</div>
<div class="mt-8 flex gap-4">
<div class="h-1 w-12 rounded-full bg-white/30"></div>
<div class="h-1 w-12 rounded-full bg-white/10"></div>
<div class="h-1 w-12 rounded-full bg-white/10"></div>
</div>
</div>
<div class="absolute bottom-6 left-1/2 z-10 -translate-x-1/2">
<div class="h-1 w-32 rounded-full bg-slate-900/20 dark:bg-white/20"></div>
</div>
</div>
</body></html>
