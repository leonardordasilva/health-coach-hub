<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Health Coach User Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-white dark:bg-background-dark shadow-2xl overflow-x-hidden">
<!-- Header -->
<div class="flex items-center p-4 sticky top-0 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md z-10 border-b border-slate-100 dark:border-slate-800 justify-between">
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight flex-1">My Profile</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-transparent text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">logout</span>
</button>
</div>
</div>
<!-- Profile Section -->
<div class="flex p-6 flex-col items-center">
<div class="relative">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 ring-4 ring-primary/20 shadow-lg" data-alt="Professional headshot of a smiling young woman" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBSAwUR0pE8qUDO55Hr0A79r8Nn0-4rZD7aNB7VwpMv89wsnrYFL4RV7pXDnKglGYwlFvRCp7lJbTGchiqsiRFOPI1ZReBXXh_7p0xE-im9aQA_juKaGDUhLJa-3sooCu1K3uBcjnlhyNJLWQK-EK-bcJ1J43-z4T5RgrqdNS72YmoUZ-inbQmjcpvPsT254_P8-N4hadYCtedWTTvKr250XTK9YIdPWkhb55-dZFJi2SskZmMQcXaHGBuNCIdXNgSqDLsNIuVQgYA");'>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-background-dark p-2 rounded-full shadow-md border-2 border-white dark:border-background-dark hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</button>
</div>
<div class="mt-4 flex flex-wrap justify-center">
<div class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-slate-100 dark:bg-slate-800 px-4">
<p class="text-slate-600 dark:text-slate-300 text-sm font-medium">alexa.health@coach.com</p>
</div>
</div>
</div>
<!-- Scrollable Form Content -->
<div class="flex-1 overflow-y-auto px-4 pb-24">
<!-- Personal Data Section -->
<div class="mb-8">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">person</span>
                    Personal Data
                </h3>
<div class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Full Name</label>
<input class="w-full rounded-xl border-none bg-slate-100 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" type="text" value="Alexa Rodriguez"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Date of Birth</label>
<input class="w-full rounded-xl border-none bg-slate-100 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" type="date" value="1992-05-15"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Gender</label>
<select class="w-full rounded-xl border-none bg-slate-100 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary">
<option selected="" value="female">Female</option>
<option value="male">Male</option>
<option value="other">Other</option>
</select>
</div>
</div>
</div>
</div>
<!-- Health Goals Section -->
<div class="mb-8">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">target</span>
                    Health Goals
                </h3>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Weight Goal (kg)</label>
<input class="w-full rounded-xl border-none bg-slate-100 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" type="number" value="62"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Body Fat (%)</label>
<input class="w-full rounded-xl border-none bg-slate-100 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" type="number" value="22"/>
</div>
</div>
</div>
<!-- Base Measurements Section -->
<div class="mb-8">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">straighten</span>
                    Base Measurements
                </h3>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Height (cm)</label>
<input class="w-full rounded-xl border-none bg-slate-100 dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary" type="number" value="168"/>
</div>
</div>
<!-- Security Section -->
<div class="mb-12">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">security</span>
                    Security
                </h3>
<button class="w-full flex items-center justify-between rounded-xl bg-slate-100 dark:bg-slate-800 px-4 py-4 text-slate-900 dark:text-slate-100 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500">key</span>
<span class="font-medium">Change Password</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
<!-- Actions -->
<div class="flex flex-col gap-3">
<button class="w-full py-4 bg-primary text-background-dark font-bold rounded-xl shadow-lg shadow-primary/20 hover:brightness-105 active:scale-[0.98] transition-all">
                    Save Changes
                </button>
<button class="w-full py-4 bg-transparent text-slate-500 dark:text-slate-400 font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Cancel
                </button>
</div>
</div>
<!-- Bottom NavBar -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto flex gap-2 border-t border-slate-100 dark:border-slate-800 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md px-4 pb-6 pt-2 z-20">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">target</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Goals</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">monitoring</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Stats</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">person</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Profile</p>
</a>
</div>
</div>
</body></html>
